# Dedicated StorageClass for the devbox, backed by local-path-provisioner.
# It has its own name (NOT the upstream "local-path") so we never collide with or
# try to mutate the immutable reclaimPolicy of the provisioner's default class.
# reclaimPolicy: Retain -> deleting the PVC won't auto-erase the data on disk.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: devbox-local-path
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
